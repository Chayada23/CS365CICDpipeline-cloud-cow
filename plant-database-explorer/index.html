<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Database Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen p-4 md:p-8 bg-gray-100">

    <header class="max-w-6xl mx-auto mb-8 text-center">
        <h1 class="text-4xl font-bold text-green-800 mb-2"><i class="fa-solid fa-leaf mr-2"></i> Plant Database Explorer</h1>
        <p class="text-gray-600 font-light">Two-Tier Architecture (AWS EC2 + RDS) Mockup</p>
    </header>

    <main class="max-w-6xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
        <section id="viewSearch" class="p-6 block">
            
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 mb-6 flex flex-wrap gap-4 items-end">
                <div class="flex-1 min-w-[150px]">
                    <label class="block text-xs text-gray-500 uppercase font-bold mb-1">หมวดหมู่</label>
                    <select id="searchCategory" onchange="performSearch()" class="w-full px-3 py-2 rounded border border-gray-300 outline-none text-sm">
                        <option value="all">ทั้งหมด</option>
                        <option value="ไม้ประดับ">ไม้ประดับ</option>
                        <option value="ผักสวนครัว">ผักสวนครัว</option>
                        <option value="ไม้มงคล">ไม้มงคล</option>
                    </select>
                </div>
                <div class="flex-1 min-w-[150px]">
                    <label class="block text-xs text-gray-500 uppercase font-bold mb-1">การดูแล</label>
                    <select id="searchCare" onchange="performSearch()" class="w-full px-3 py-2 rounded border border-gray-300 outline-none text-sm">
                        <option value="all">ทั้งหมด</option>
                        <option value="ง่าย (มือใหม่)">ง่าย (มือใหม่)</option>
                        <option value="ปานกลาง">ปานกลาง</option>
                        <option value="ยาก (เซียน)">ยาก (เซียน)</option>
                    </select>
                </div>
                <div class="flex-1 min-w-[150px]">
                    <label class="block text-xs text-gray-500 uppercase font-bold mb-1">แสงแดด</label>
                    <select id="searchSunlight" onchange="performSearch()" class="w-full px-3 py-2 rounded border border-gray-300 outline-none text-sm">
                        <option value="all">ทั้งหมด</option>
                        <option value="แดดจัด">แดดจัด</option>
                        <option value="รำไร">รำไร</option>
                        <option value="ในร่ม">ในร่ม</option>
                    </select>
                </div>
                <div class="flex-1 min-w-[150px]">
                    <label class="block text-xs text-gray-500 uppercase font-bold mb-1">ปริมาณน้ำ</label>
                    <select id="searchWater" onchange="performSearch()" class="w-full px-3 py-2 rounded border border-gray-300 outline-none text-sm">
                        <option value="all">ทั้งหมด</option>
                        <option value="มาก">มาก</option>
                        <option value="ปานกลาง">ปานกลาง</option>
                        <option value="น้อย">น้อย</option>
                    </select>
                </div>
                <div>
                    <button onclick="resetFilters()" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded text-sm font-bold transition">
                        <i class="fa-solid fa-rotate-right"></i> ล้างค่า
                    </button>
                </div>
            </div>

            <div class="overflow-x-auto overflow-y-auto max-h-[500px] border border-gray-200 rounded-lg shadow-inner relative">
                <table class="w-full text-left border-collapse whitespace-nowrap">
                    <thead class="sticky top-0 z-10">
                        <tr class="bg-green-700 text-white text-xs uppercase tracking-wider">
                            <th class="p-3 border-b border-green-800">ID</th>
                            <th class="p-3 border-b border-green-800">ชื่อพันธุ์พืช</th>
                            <th class="p-3 border-b border-green-800">หมวดหมู่</th>
                            <th class="p-3 border-b border-green-800 text-center">ระดับการดูแล</th>
                            <th class="p-3 border-b border-green-800 text-center">แสงแดด</th>
                            <th class="p-3 border-b border-green-800 text-center">ปริมาณน้ำ</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm text-gray-700 bg-white">
                    </tbody>
                </table>
            </div>

            <div class="mt-4 p-3 bg-gray-900 text-green-400 rounded-lg font-mono text-xs shadow-inner">
                <p class="font-bold mb-1">▶ Console Log (Reader DB Query):</p>
                <p id="logMessage">> ระบบพร้อมทำงาน ดึงข้อมูลจากฐานข้อมูลล่าสุดสำเร็จ...</p>
            </div>
        </section>
    </main>

    <div id="plantModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full overflow-hidden shadow-2xl">
            <div class="relative h-64 bg-gray-200">
                <img id="modalImage" src="" alt="plant image" class="w-full h-full object-cover">
                <button onclick="closeModal()" class="absolute top-4 right-4 bg-white/80 backdrop-blur rounded-full p-2 shadow-lg hover:bg-white transition">
                    <i class="fa-solid fa-xmark text-gray-800"></i>
                </button>
            </div>
            <div class="p-6 text-left">
                <div class="flex justify-between items-start mb-4">
                    <h2 id="modalName" class="text-3xl font-bold text-gray-800"></h2>
                    <span id="modalCategory" class="bg-gray-100 text-gray-700 px-3 py-1 rounded-full text-xs font-bold border border-gray-200 uppercase tracking-tighter"></span>
                </div>
                <div class="grid grid-cols-3 gap-3 mb-6">
                    <div class="bg-gray-50 p-2 rounded-lg border border-gray-100 text-center">
                        <p class="text-[9px] text-gray-400 uppercase font-bold mb-1">การดูแล</p>
                        <p id="modalCare" class="text-[11px] font-bold"></p>
                    </div>
                    <div class="bg-gray-50 p-2 rounded-lg border border-gray-100 text-center text-amber-600">
                        <p class="text-[9px] text-gray-400 uppercase font-bold mb-1">แสงแดด</p>
                        <p id="modalSun" class="text-[11px] font-bold"></p>
                    </div>
                    <div class="bg-gray-50 p-2 rounded-lg border border-gray-100 text-center text-blue-600">
                        <p class="text-[9px] text-gray-400 uppercase font-bold mb-1">ปริมาณน้ำ</p>
                        <p id="modalWater" class="text-[11px] font-bold"></p>
                    </div>
                </div>
                <p id="modalDesc" class="text-gray-600 leading-relaxed text-sm italic border-l-4 border-green-500 pl-3 bg-green-50/50 py-2 rounded-r-lg"></p>
            </div>
            <div class="p-4 bg-gray-50 text-right">
                <button onclick="closeModal()" class="px-6 py-2 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700 transition shadow-md">เข้าใจแล้ว</button>
            </div>
        </div>
    </div>

    <script src="mockData.js"></script>
    <script src="script.js"></script>
</body>
</html>
