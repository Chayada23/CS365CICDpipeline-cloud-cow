name: Full CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  terraform:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4  # ✅ แก้จาก v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4  # ✅ แก้จาก v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3  # ✅ แก้จาก v2
        with:
          terraform_wrapper: false  # ✅ ป้องกัน debug text ปนใน output

      - name: Terraform Init
        run: terraform -chdir=Two-Tier-Architecture/bloody-sweet init -upgrade -reconfigure

      - name: Terraform Validate
        run: terraform -chdir=Two-Tier-Architecture/bloody-sweet validate

      - name: Terraform Destroy
        run: terraform -chdir=Two-Tier-Architecture/bloody-sweet destroy -auto-approve -var-file="variables.tfvars"
        continue-on-error: true

      - name: Terraform Apply
        run: terraform -chdir=Two-Tier-Architecture/bloody-sweet apply -auto-approve -var-file="variables.tfvars"


  e2e-test:
    name: End-to-End Testing
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4  # ✅ แก้จาก v3

      # ✅ เพิ่ม AWS credentials (จำเป็นสำหรับดึง Terraform state จาก S3)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3  # ✅ แก้จาก v2
        with:
          terraform_wrapper: false  # ✅ สำคัญมาก: ทำให้ output ได้ค่า clean

      - name: Init Terraform (for state access)
        run: terraform -chdir=Two-Tier-Architecture/bloody-sweet init -reconfigure

      - name: Get ALB DNS
        run: |
          ALB_DNS=$(terraform -chdir=Two-Tier-Architecture/bloody-sweet output -raw alb_dns)
          echo "ALB=$ALB_DNS"
          echo "alb_dns=$ALB_DNS" >> $GITHUB_ENV

      - name: Validate ALB DNS
        run: |
          if [ -z "$alb_dns" ]; then
            echo "ALB DNS is empty!"
            exit 1
          fi

      - name: Wait for ALB
        run: sleep 60

      - name: Test Web HTTP Response (Case 1)
        run: curl --retry 10 --retry-delay 5 -f http://$alb_dns

      - name: Test Static Page Load (Case 2)
        run: curl -f http://$alb_dns | grep -i "Mini Finance"

      - name: Test Failure Scenario (Case 3)
        run: curl -f http://$alb_dns/nonexist || echo "Handled 404 correctly"  # ✅ ลบ "workflow" ออก