name: Full CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  terraform:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest

    outputs:
      alb_dns: ${{ steps.get_output.outputs.alb_dns }}

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Clean Terraform
        run: rm -rf .terraform .terraform.lock.hcl

      - name: Terraform Init
        run: terraform -chdir=Two-Tier-Architecture/bloody-sweet init -upgrade -reconfigure

      - name: Terraform Validate
        run: terraform -chdir=Two-Tier-Architecture/bloody-sweet validate

      - name: Terraform Plan
        run: terraform -chdir=Two-Tier-Architecture/bloody-sweet plan -var-file="variables.tfvars"

      - name: Terraform Destroy (reset infra)
        run: terraform -chdir=Two-Tier-Architecture/bloody-sweet destroy -auto-approve -var-file="variables.tfvars"
        continue-on-error: true

      - name: Terraform Apply
        run: terraform -chdir=Two-Tier-Architecture/bloody-sweet apply -auto-approve -var-file="variables.tfvars"

      # ✅ FIX: export terraform output
      - name: Get ALB DNS output
        id: get_output
        run: |
          echo "alb_dns=$(terraform -chdir=Two-Tier-Architecture/bloody-sweet output -raw alb_dns)" >> $GITHUB_OUTPUT


  e2e-test:
    name: End-to-End Testing
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - name: Debug ALB DNS
        run: echo "ALB = ${{ needs.terraform.outputs.alb_dns }}"

      - name: Validate ALB DNS exists
        run: |
          if [ -z "${{ needs.terraform.outputs.alb_dns }}" ]; then
            echo "ALB DNS is empty!"
            exit 1
          fi

      - name: Wait for ALB to be ready
        run: sleep 30

      - name: Test Web HTTP Response (Case 1)
        run: |
          curl --retry 10 --retry-delay 5 -f http://${{ needs.terraform.outputs.alb_dns }}

      - name: Test Static Page Load (Case 2)
        run: |
          curl -f http://${{ needs.terraform.outputs.alb_dns }} | grep -i "Mini Finance"

      - name: Test Failure Scenario (Case 3)
        run: |
          curl -f http://${{ needs.terraform.outputs.alb_dns }}/nonexist || echo "Handled 404 correctly"