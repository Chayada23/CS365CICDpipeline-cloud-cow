name: Full CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  terraform:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform -chdir=Two-Tier-Architecture/bloody-sweet init -upgrade -reconfigure

      - name: Terraform Validate
        run: terraform -chdir=Two-Tier-Architecture/bloody-sweet validate

      # ✅ ONLY APPLY (NO DESTROY)
      - name: Terraform Apply
        run: terraform -chdir=Two-Tier-Architecture/bloody-sweet apply -auto-approve -var-file="variables.tfvars"


  e2e-test:
    name: End-to-End Testing
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Init Terraform
        run: terraform -chdir=Two-Tier-Architecture/bloody-sweet init -reconfigure

      # ✅ SAFE GET OUTPUT
      - name: Get ALB DNS
        run: |
          ALB_DNS=$(terraform -chdir=Two-Tier-Architecture/bloody-sweet output -raw alb_dns 2>/dev/null || echo "")
          echo "alb_dns=$ALB_DNS" >> $GITHUB_ENV
          echo "ALB = $ALB_DNS"

      - name: Validate ALB DNS
        run: |
          if [ -z "$alb_dns" ]; then
            echo "❌ ALB DNS is empty!"
            exit 1
          fi
          echo "✅ ALB DNS: $alb_dns"

      - name: Wait for ALB
        run: |
          echo "⏳ Waiting for ALB..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$alb_dns)
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ ALB ready"
              exit 0
            fi
            sleep 15
          done
          echo "❌ ALB not ready"
          exit 1

      - name: Test Case 1 (HTTP 200)
        run: |
          curl -f http://$alb_dns

      - name: Test Case 2 (Content Check)
        run: |
          curl -sf http://$alb_dns | grep -i "Mini Finance"

      - name: Test Case 3 (404 Handling)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$alb_dns/nonexist)
          if [ "$STATUS" = "404" ] || [ "$STATUS" = "200" ]; then
            echo "✅ Case 3 passed"
          else
            echo "❌ Failed"
            exit 1
          fi