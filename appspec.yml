version: 0.0
os: linux
files:
  - source: /          # เอาทุกไฟล์ใน repo
    destination: /var/www/html  # ไปวางที่นี่

hooks:
  BeforeInstall:
    - location: scripts/stop_nginx.sh   ← ลบไฟล์เก่าก่อน
      timeout: 300
  AfterInstall:
    - location: scripts/start_nginx.sh  ← copy เสร็จแล้วค่อย start
      timeout: 300
  ValidateService:
    - location: scripts/validate.sh
      timeout: 300